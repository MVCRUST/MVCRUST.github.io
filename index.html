<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeepRoot</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">

    <span class="navbar-brand logo">DEEPROOT</span>

    <div class="ms-auto nav-links">
      <a class="nav-link" href="index.html">Make Prompt</a>
      <a class="nav-link" href="library.html">Access Library</a>
    </div>

  </div>
</nav>


<div class="container-fluid">

<div class="row main-layout">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar">

    <div class="sidebar-header">
        <span>Prompt History Test</span>
        <button class="add-btn">+</button>
    </div>

    <div class="history-item">
        Example of previous Prompt
    </div>

</div>


<!-- MAIN CONTENT -->
<div class="col-md-10 main-content">

    <!-- PROMPT INPUT -->
    <div class="prompt-input">
        <input 
        type="text" 
        id="promptInput" 
        placeholder="Enter Your Prompt"
        class="form-control">
    </div>


    <!-- RESPONSE -->
    <div class="response-box">

        <div id="responseTitle" class="response-title">Prompt Response</div>

        <div id="responseOutput"></div>

    </div>


    <!-- REFERENCES -->
    <div id="referencesBox" class="references-box">
        <!-- sources will be injected here -->
    </div>

    <!-- SERVICE / INDEX STATUS -->
    <div id="serviceStatus" class="alert alert-info mt-3" role="alert">
        Checking service...
    </div>
    <div id="indexStatus" class="alert alert-secondary mt-2" role="alert">
        Checking index...
    </div>
    <button id="rebuildIndexBtn" class="btn btn-warning btn-sm mb-4">Rebuild Index</button>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>

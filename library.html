<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeepRoot Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>


<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">

    <span class="navbar-brand logo">DEEPROOT</span>

    <div class="ms-auto nav-links">
      <a class="nav-link" href="index.html">Make Prompt</a>
      <a class="nav-link" href="library.html">Access Library</a>
    </div>

  </div>
</nav>


<div class="container-fluid">

<div class="row main-layout">

<!-- SIDEBAR -->

<div class="col-md-3 sidebar">

    <h5 class="library-title">Current Library</h5>

    <div id="documentList">
        <!-- documents will be populated by script.js -->
    </div>

    <!-- SERVICE / INDEX STATUS -->
    <div id="serviceStatus" class="alert alert-info mt-3" role="alert">
        Checking service...
    </div>
    <div id="indexStatus" class="alert alert-secondary mt-2" role="alert">
        Checking index...
    </div>
    <button id="rebuildIndexBtn" class="btn btn-warning btn-sm mb-4">Rebuild Index</button>

</div>


<!-- MAIN AREA -->

<div class="col-md-9 main-content text-center">

<div class="upload-area" id="uploadArea">

<input type="file" id="fileUpload" multiple hidden>

<div class="upload-content">

<div class="upload-icon">📄</div>

<h3>Upload Documents</h3>

<p>Drag & drop files here or <span class="upload-link">browse</span></p>

<p class="upload-subtext">
Accepted: PDF, DOCX, TXT • Max size 10MB
</p>

</div>

</div>


<div class="progress-container">

<div class="progress">
<div class="progress-bar" id="uploadProgress"></div>
</div>

</div>

</div>


</div>
</div>

<script src="script.js"></script>

</body>
</html>
